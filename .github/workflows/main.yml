name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build APK
        run: |
          # Esto automatiza la creación de la APK
          yes | bubblewrap init --manifest=https://raw.githubusercontent.com/${{ github.repository }}/main/manifest.json || true
          bubblewrap build --skip-signing
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AleGamePad-APK
          path: ./*.apk

